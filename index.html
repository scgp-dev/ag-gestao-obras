<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>PMO — A.Gaspar Infraestrutura</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;400;600;700;800&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mapbox/togeojson@0.16.0/togeojson.js"></script>
<style>
/* ── RESET ── */
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;font-family:'Barlow',sans-serif;background:#0D0B1A;}

/* ── MAP ── */
#map{position:fixed;inset:0;z-index:0;}
.leaflet-control-zoom{display:none;}

/* ── HEADER ── */
#header{
  position:fixed;top:0;left:0;right:0;z-index:1000;
  height:60px;
  background:rgba(15,10,36,.88);
  backdrop-filter:blur(14px);
  -webkit-backdrop-filter:blur(14px);
  border-bottom:1px solid rgba(255,255,255,.08);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 24px;
}
.hd-left{display:flex;align-items:center;gap:14px;}
.hd-logo{
  background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);
  border-radius:8px;padding:6px 14px;
  font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;
  color:rgba(255,255,255,.85);letter-spacing:.6px;
}
.hd-sep{width:1px;height:22px;background:rgba(255,255,255,.12);}
.hd-title{
  font-family:'Barlow Condensed',sans-serif;font-size:17px;font-weight:700;
  color:var(--branco,#fff);letter-spacing:.4px;
}
.hd-sub{font-size:10px;color:rgba(255,255,255,.35);margin-top:1px;}
.hd-right{display:flex;align-items:center;gap:10px;}
.hd-badge{
  background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);
  border-radius:20px;padding:5px 14px;
  font-size:10px;font-weight:600;color:rgba(255,255,255,.55);letter-spacing:.5px;
  text-transform:uppercase;
}
.hd-badge strong{color:#fff;font-size:12px;margin-right:4px;}

/* ── ZOOM CONTROLS custom ── */
#zoom-ctrl{
  position:fixed;bottom:40px;right:20px;z-index:900;
  display:flex;flex-direction:column;gap:4px;
}
.z-btn{
  width:34px;height:34px;border-radius:8px;border:none;
  background:rgba(15,10,36,.88);backdrop-filter:blur(10px);
  color:rgba(255,255,255,.7);font-size:18px;font-weight:300;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  border:1px solid rgba(255,255,255,.1);transition:background .15s;
}
.z-btn:hover{background:rgba(40,21,110,.8);color:#fff;}

/* ── LEGEND ── */
#legend{
  position:fixed;bottom:40px;left:20px;z-index:900;
  background:rgba(15,10,36,.88);backdrop-filter:blur(12px);
  border:1px solid rgba(255,255,255,.08);border-radius:10px;
  padding:14px 18px;min-width:160px;
}
.leg-title{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1px;
  color:rgba(255,255,255,.35);margin-bottom:10px;}
.leg-item{display:flex;align-items:center;gap:8px;margin-bottom:7px;font-size:11px;color:rgba(255,255,255,.6);}
.leg-item:last-child{margin-bottom:0;}
.leg-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.leg-dot.execucao{background:#FBBF24;box-shadow:0 0 6px #FBBF2488;}
.leg-dot.planejamento{background:#60A5FA;box-shadow:0 0 6px #60A5FA55;}
.leg-dot.estudo{background:rgba(255,255,255,.3);}
.leg-dot.concluida{background:#34D399;box-shadow:0 0 6px #34D39955;}

/* ── SIDE PANEL ── */
#side-panel{
  position:fixed;top:60px;right:0;bottom:0;z-index:800;
  width:360px;
  background:rgba(12,8,30,.97);
  backdrop-filter:blur(24px);
  border-left:1px solid rgba(255,255,255,.08);
  transform:translateX(100%);
  transition:transform .38s cubic-bezier(.4,0,.2,1);
  display:flex;flex-direction:column;
  overflow:hidden;
}
#side-panel.open{transform:translateX(0);}

.sp-close{
  position:absolute;top:14px;right:14px;
  width:28px;height:28px;border-radius:6px;border:none;
  background:rgba(255,255,255,.07);color:rgba(255,255,255,.5);
  font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:background .15s;z-index:1;
}
.sp-close:hover{background:rgba(255,255,255,.15);color:#fff;}

.sp-map-thumb{
  height:160px;background:#1a0d4a;flex-shrink:0;
  position:relative;overflow:hidden;
}
.sp-map-thumb canvas{width:100%!important;height:100%!important;}
.sp-thumb-overlay{
  position:absolute;inset:0;
  background:linear-gradient(to bottom,rgba(12,8,30,0) 40%,rgba(12,8,30,.97) 100%);
  display:flex;flex-direction:column;justify-content:flex-end;padding:14px 18px;
}
.sp-status-pill{
  display:inline-flex;align-items:center;gap:5px;
  border-radius:20px;padding:3px 10px;font-size:9px;font-weight:700;
  text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px;align-self:flex-start;
}
.sp-status-pill.execucao{background:rgba(251,191,36,.15);color:#FBBF24;border:1px solid rgba(251,191,36,.3);}
.sp-status-pill.planejamento{background:rgba(96,165,250,.12);color:#60A5FA;border:1px solid rgba(96,165,250,.25);}
.sp-status-pill.estudo{background:rgba(255,255,255,.06);color:rgba(255,255,255,.5);border:1px solid rgba(255,255,255,.12);}
.sp-status-pill.concluida{background:rgba(52,211,153,.12);color:#34D399;border:1px solid rgba(52,211,153,.25);}
.sp-dot{width:6px;height:6px;border-radius:50%;background:currentColor;}

.sp-nome{
  font-family:'Barlow Condensed',sans-serif;font-size:24px;font-weight:800;
  color:#fff;line-height:1.1;
}
.sp-local{font-size:11px;color:rgba(255,255,255,.45);margin-top:3px;}

.sp-body{flex:1;overflow-y:auto;padding:18px;}
.sp-body::-webkit-scrollbar{width:4px;}
.sp-body::-webkit-scrollbar-track{background:transparent;}
.sp-body::-webkit-scrollbar-thumb{background:rgba(255,255,255,.12);border-radius:2px;}

.sp-section{margin-bottom:18px;}
.sp-sec-title{
  font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;
  color:rgba(255,255,255,.25);margin-bottom:10px;
}
.sp-info-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.sp-info-item{
  background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);
  border-radius:8px;padding:10px 12px;
}
.sp-info-lbl{font-size:9px;color:rgba(255,255,255,.3);text-transform:uppercase;
  letter-spacing:.8px;margin-bottom:3px;}
.sp-info-val{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:600;color:#fff;}

.sp-valor{
  background:rgba(40,21,110,.3);border:1px solid rgba(40,21,110,.6);
  border-radius:10px;padding:14px 16px;
  display:flex;align-items:center;justify-content:space-between;
}
.sp-valor-lbl{font-size:10px;color:rgba(255,255,255,.4);}
.sp-valor-num{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:700;color:#fff;}

.sp-paineis-title{
  font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;
  color:rgba(255,255,255,.25);margin-bottom:10px;
}
.sp-painel-btn{
  display:flex;align-items:center;gap:12px;
  background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);
  border-radius:10px;padding:13px 16px;margin-bottom:8px;
  text-decoration:none;cursor:pointer;
  transition:background .15s,border-color .15s;
}
.sp-painel-btn:hover{background:rgba(40,21,110,.5);border-color:rgba(40,21,110,.8);}
.sp-painel-btn.disabled{opacity:.4;pointer-events:none;cursor:default;}
.sp-painel-icon{
  width:36px;height:36px;border-radius:8px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;font-size:16px;
}
.sp-painel-icon.fisico{background:rgba(40,21,110,.4);}
.sp-painel-icon.financeiro{background:rgba(180,83,9,.25);}
.sp-painel-info{flex:1;}
.sp-painel-name{font-size:13px;font-weight:600;color:#fff;}
.sp-painel-desc{font-size:10px;color:rgba(255,255,255,.35);margin-top:1px;}
.sp-painel-arrow{color:rgba(255,255,255,.25);font-size:12px;}

.sp-footer{
  padding:14px 18px;border-top:1px solid rgba(255,255,255,.06);flex-shrink:0;
}
.sp-cta{
  display:block;width:100%;padding:13px;border-radius:10px;border:none;
  background:linear-gradient(135deg,#28156E,#3D2490);
  color:#fff;font-family:'Barlow Condensed',sans-serif;
  font-size:15px;font-weight:700;letter-spacing:.5px;
  cursor:pointer;text-align:center;text-decoration:none;
  transition:opacity .15s;
}
.sp-cta:hover{opacity:.85;}
.sp-cta.disabled{background:rgba(255,255,255,.07);color:rgba(255,255,255,.3);
  cursor:default;pointer-events:none;}

/* ── MARKER styles ── */
.mk-wrap{
  display:flex;flex-direction:column;align-items:center;cursor:pointer;
}
.mk-body{
  width:46px;height:46px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  border:2px solid rgba(255,255,255,.2);
  background:rgba(15,10,36,.85);
  backdrop-filter:blur(6px);
  transition:transform .2s;
  box-shadow:0 4px 20px rgba(0,0,0,.6);
}
.mk-body svg{filter:drop-shadow(0 0 3px currentColor);}
.mk-body.execucao{border-color:#FBBF24;animation:pulse-y 2.5s infinite;}
.mk-body.planejamento{border-color:#60A5FA;}
.mk-body.estudo{border-color:rgba(255,255,255,.3);}
.mk-body.concluida{border-color:#34D399;animation:pulse-g 2.5s infinite;}
.mk-label{
  margin-top:5px;
  background:rgba(12,8,30,.85);backdrop-filter:blur(8px);
  border:1px solid rgba(255,255,255,.1);
  border-radius:20px;padding:3px 9px;
  font-size:9px;font-weight:600;color:rgba(255,255,255,.7);
  white-space:nowrap;letter-spacing:.3px;
}
@keyframes pulse-y{
  0%,100%{box-shadow:0 4px 20px rgba(0,0,0,.6),0 0 0 0 rgba(251,191,36,.5);}
  50%{box-shadow:0 4px 20px rgba(0,0,0,.6),0 0 0 10px rgba(251,191,36,0);}
}
@keyframes pulse-g{
  0%,100%{box-shadow:0 4px 20px rgba(0,0,0,.6),0 0 0 0 rgba(52,211,153,.5);}
  50%{box-shadow:0 4px 20px rgba(0,0,0,.6),0 0 0 10px rgba(52,211,153,0);}
}

/* ── Layer toggle ── */
#layer-toggle{
  position:fixed;top:74px;right:14px;z-index:900;
  display:flex;gap:4px;
  background:rgba(12,8,30,.88);backdrop-filter:blur(12px);
  border:1px solid rgba(255,255,255,.08);border-radius:8px;padding:4px;
}
.lt-btn{
  padding:5px 11px;border-radius:5px;border:none;
  font-family:'Barlow',sans-serif;font-size:10px;font-weight:600;
  color:rgba(255,255,255,.4);background:transparent;cursor:pointer;
  transition:all .15s;letter-spacing:.3px;
}
.lt-btn.active{background:rgba(40,21,110,.7);color:#fff;}

/* ── KMZ toggle ── */
#kmz-toggle{
  position:fixed;top:118px;right:14px;z-index:900;
  background:rgba(12,8,30,.88);backdrop-filter:blur(12px);
  border:1px solid rgba(255,255,255,.08);border-radius:8px;padding:4px;
}
.kmz-btn{
  display:flex;align-items:center;gap:6px;
  padding:5px 11px;border-radius:5px;border:none;
  font-family:'Barlow',sans-serif;font-size:10px;font-weight:600;
  color:rgba(255,255,255,.4);background:transparent;cursor:pointer;
  transition:all .15s;letter-spacing:.3px;
}
.kmz-btn.active{background:rgba(40,21,110,.7);color:#fff;}
.kmz-btn .kmz-dot{
  width:7px;height:7px;border-radius:50%;
  background:rgba(251,191,36,.6);flex-shrink:0;
}
.kmz-btn.active .kmz-dot{background:#FBBF24;box-shadow:0 0 5px #FBBF2488;}
</style>
</head>
<body>

<!-- MAP -->
<div id="map"></div>

<!-- HEADER -->
<div id="header">
  <div class="hd-left">
    <div class="hd-logo">A.GASPAR</div>
    <div class="hd-sep"></div>
    <div>
      <div class="hd-title">PMO — Central de Obras</div>
      <div class="hd-sub">Infraestrutura Viária · Brasil</div>
    </div>
  </div>
  <div class="hd-right">
    <div class="hd-badge"><strong id="n-execucao">1</strong> Em execução</div>
    <div class="hd-badge"><strong id="n-total">5</strong> Obras cadastradas</div>
  </div>
</div>

<!-- LAYER TOGGLE -->
<div id="layer-toggle">
  <button class="lt-btn active" onclick="setLayer('satellite',this)">Satélite</button>
  <button class="lt-btn" onclick="setLayer('dark',this)">Escuro</button>
  <button class="lt-btn" onclick="setLayer('streets',this)">Mapa</button>
</div>

<!-- KMZ TOGGLE -->
<div id="kmz-toggle" style="display:none">
  <button class="kmz-btn" id="btn-kmz" onclick="toggleKmz(this)">
    <span class="kmz-dot"></span>Traçado da Obra
  </button>
</div>

<!-- ZOOM -->
<div id="zoom-ctrl">
  <button class="z-btn" onclick="map.zoomIn()">+</button>
  <button class="z-btn" onclick="map.zoomOut()">−</button>
</div>

<!-- LEGEND -->
<div id="legend">
  <div class="leg-title">Status da Obra</div>
  <div class="leg-item"><div class="leg-dot execucao"></div>Em execução</div>
  <div class="leg-item"><div class="leg-dot planejamento"></div>Planejamento</div>
  <div class="leg-item"><div class="leg-dot estudo"></div>Estudo / Projeto</div>
  <div class="leg-item"><div class="leg-dot concluida"></div>Concluída</div>
</div>

<!-- SIDE PANEL -->
<div id="side-panel">
  <button class="sp-close" onclick="fecharPanel()">✕</button>

  <!-- Thumb / header da obra -->
  <div class="sp-map-thumb" id="sp-thumb">
    <div class="sp-thumb-overlay">
      <div class="sp-status-pill" id="sp-pill">
        <div class="sp-dot"></div>
        <span id="sp-status-txt">—</span>
      </div>
      <div class="sp-nome" id="sp-nome">—</div>
      <div class="sp-local" id="sp-local">—</div>
    </div>
  </div>

  <div class="sp-body">
    <!-- Infos -->
    <div class="sp-section">
      <div class="sp-sec-title">Dados do Contrato</div>
      <div class="sp-info-grid">
        <div class="sp-info-item">
          <div class="sp-info-lbl">Contrato</div>
          <div class="sp-info-val" id="sp-contrato">—</div>
        </div>
        <div class="sp-info-item">
          <div class="sp-info-lbl">Contratante</div>
          <div class="sp-info-val" id="sp-contratante">—</div>
        </div>
        <div class="sp-info-item">
          <div class="sp-info-lbl">Início</div>
          <div class="sp-info-val" id="sp-inicio">—</div>
        </div>
        <div class="sp-info-item">
          <div class="sp-info-lbl">Prazo</div>
          <div class="sp-info-val" id="sp-prazo">—</div>
        </div>
      </div>
    </div>

    <div class="sp-section">
      <div class="sp-valor">
        <div>
          <div class="sp-valor-lbl">Valor Contratual</div>
          <div class="sp-valor-num" id="sp-valor">—</div>
        </div>
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,.2)" stroke-width="1.5"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
      </div>
    </div>

    <!-- Painéis disponíveis -->
    <div class="sp-section">
      <div class="sp-paineis-title">Painéis disponíveis</div>
      <div id="sp-paineis-list"></div>
    </div>
  </div>

  <div class="sp-footer">
    <a id="sp-cta" href="#" class="sp-cta disabled">Acessar Portal da Obra →</a>
  </div>
</div>

<script>
// ── OBRAS ────────────────────────────────────────────────
const OBRAS = [
  {
    id: 'grauna-gaivotas',
    nome: 'Ponte Graúna-Gaivotas',
    local: 'Grajaú / Gaivotas — São Paulo, SP',
    contrato: '029/SIURB/2025',
    contratante: 'SIURB / PMSP',
    status: 'execucao',
    statusLabel: 'Em execução',
    inicio: '07/07/2025',
    prazo: '18/05/2028',
    valor: 'R$ 347,5 Mi',
    lat: -23.722739629608064,
    lng: -46.67293154955003,
    kmz: 'obras/SP-10/kmz/Segmento_1.kmz',
    portal: 'obras/SP-10/index.html',
    paineis: [
      { tipo:'fisico',      nome:'Avanço Físico',     desc:'Progresso construtivo por elemento', href:'obras/SP-10/fisico.html' },
      { tipo:'financeiro',  nome:'Painel Financeiro',  desc:'Medições, EAP e valores',            href:'obras/SP-10/financeiro.html' },
    ]
  },
  {
    id: 'oae3-rio-vermelho',
    nome: 'OAE 3 · Ponte do Rio Vermelho',
    local: 'Rondonópolis — MT',
    contrato: 'LRV80/2023 | CW47524',
    contratante: 'RUMO S.A.',
    status: 'concluida',
    statusLabel: 'Concluída',
    inicio: 'Jan/2024',
    prazo: 'Nov/2025',
    valor: 'R$ 146,0 Mi',
    lat: -16.4706,
    lng: -54.6358,
    kmz: 'obras/MT-02/kmz/MT-002.kmz',
    portal: 'obras/MT-02/index.html',
    paineis: [
      { tipo:'financeiro', nome:'Relatório Gerencial', desc:'Faturamento, custos e medições — BM final 18', href:'obras/MT-02/MT-002_Relatorio_Gerencial.html' },
    ]
  },
];

// ── LAYERS ──────────────────────────────────────────────
const LAYERS = {
  satellite: L.tileLayer(
    'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
    { attribution:'Esri, Maxar, Earthstar Geographics' }
  ),
  dark: L.tileLayer(
    'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',
    { attribution:'CartoDB' }
  ),
  streets: L.tileLayer(
    'https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png',
    { attribution:'CartoDB' }
  ),
};
// Labels sobre satélite
const labelsLayer = L.tileLayer(
  'https://{s}.basemaps.cartocdn.com/dark_only_labels/{z}/{x}/{y}{r}.png',
  { attribution:'', pane:'overlayPane' }
);

// ── MAP INIT ─────────────────────────────────────────────
const map = L.map('map',{
  center:[-15.5,-51.5],
  zoom:5,
  zoomControl:false,
  attributionControl:false,
});
LAYERS.satellite.addTo(map);
labelsLayer.addTo(map);

let currentLayerKey = 'satellite';

function setLayer(key, btn) {
  map.removeLayer(LAYERS[currentLayerKey]);
  if(currentLayerKey==='satellite') map.removeLayer(labelsLayer);
  currentLayerKey = key;
  LAYERS[key].addTo(map);
  if(key==='satellite') labelsLayer.addTo(map);
  document.querySelectorAll('.lt-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
}

// ── MARCADORES ──────────────────────────────────────────
const svgBridge = `
<svg width="22" height="22" viewBox="0 0 24 24" fill="none"
     stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <line x1="2" y1="19" x2="22" y2="19"/>
  <line x1="7" y1="19" x2="7" y2="10"/>
  <line x1="17" y1="19" x2="17" y2="10"/>
  <path d="M7 10 Q12 4 17 10"/>
  <line x1="2" y1="19" x2="7" y2="10"/>
  <line x1="22" y1="19" x2="17" y2="10"/>
  <line x1="7" y1="10" x2="12" y2="13"/>
  <line x1="17" y1="10" x2="12" y2="13"/>
</svg>`;

const colorMap = {
  execucao:   '#FBBF24',
  planejamento:'#60A5FA',
  estudo:     'rgba(255,255,255,.55)',
  concluida:  '#34D399',
};

OBRAS.forEach(obra => {
  const cor = colorMap[obra.status] || '#fff';
  const icone = L.divIcon({
    className:'',
    iconSize:[46,62],
    iconAnchor:[23,31],
    html:`
      <div class="mk-wrap">
        <div class="mk-body ${obra.status}" style="color:${cor}">
          ${svgBridge}
        </div>
        <div class="mk-label">${obra.nome.split(' ').slice(0,2).join(' ')}</div>
      </div>`
  });
  const marker = L.marker([obra.lat, obra.lng], { icon:icone });
  marker.on('click', () => abrirPanel(obra, marker));
  marker.addTo(map);
});

// ── PANEL ────────────────────────────────────────────────
let thumbMap = null;

function abrirPanel(obra, marker) {
  const panel = document.getElementById('side-panel');

  // Populate
  const pill = document.getElementById('sp-pill');
  pill.className = `sp-status-pill ${obra.status}`;
  document.getElementById('sp-status-txt').textContent = obra.statusLabel;
  document.getElementById('sp-nome').textContent = obra.nome;
  document.getElementById('sp-local').textContent = obra.local;
  document.getElementById('sp-contrato').textContent = obra.contrato;
  document.getElementById('sp-contratante').textContent = obra.contratante;
  document.getElementById('sp-inicio').textContent = obra.inicio;
  document.getElementById('sp-prazo').textContent = obra.prazo;
  document.getElementById('sp-valor').textContent = obra.valor;

  // Thumb mini-map
  const thumb = document.getElementById('sp-thumb');
  if(thumbMap){ thumbMap.remove(); thumbMap=null; }
  const thumbDiv = document.createElement('div');
  thumbDiv.style.cssText='width:100%;height:100%;position:absolute;top:0;left:0;';
  // keep overlay on top
  const overlay = thumb.querySelector('.sp-thumb-overlay');
  thumb.insertBefore(thumbDiv, overlay);
  thumbMap = L.map(thumbDiv,{
    center:[obra.lat, obra.lng], zoom:12,
    zoomControl:false, attributionControl:false,
    dragging:false, scrollWheelZoom:false,
    doubleClickZoom:false, keyboard:false,
  });
  L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}').addTo(thumbMap);
  L.circleMarker([obra.lat,obra.lng],{
    radius:6,color:colorMap[obra.status],fillColor:colorMap[obra.status],
    fillOpacity:1,weight:2,
  }).addTo(thumbMap);

  // Painéis
  const list = document.getElementById('sp-paineis-list');
  list.innerHTML = '';
  obra.paineis.forEach(p => {
    const disabled = !p.href;
    const a = document.createElement(disabled?'div':'a');
    if(!disabled) a.href = p.href;
    a.className = `sp-painel-btn${disabled?' disabled':''}`;
    const iconSvg = p.tipo==='fisico'
      ? `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="rgba(167,139,250,.9)" stroke-width="2" stroke-linecap="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>`
      : `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="rgba(251,191,36,.9)" stroke-width="2" stroke-linecap="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>`;
    a.innerHTML = `
      <div class="sp-painel-icon ${p.tipo}">${iconSvg}</div>
      <div class="sp-painel-info">
        <div class="sp-painel-name">${p.nome}</div>
        <div class="sp-painel-desc">${p.desc}</div>
      </div>
      <div class="sp-painel-arrow">${disabled?'':'→'}</div>`;
    list.appendChild(a);
  });

  // CTA
  const cta = document.getElementById('sp-cta');
  if(obra.portal){
    cta.href = obra.portal;
    cta.className = 'sp-cta';
    cta.textContent = 'Acessar Portal da Obra →';
  } else {
    cta.href = '#';
    cta.className = 'sp-cta disabled';
    cta.textContent = 'Portal não disponível';
  }

  // KMZ toggle por obra
  atualizarKmzToggle(obra);

  panel.classList.add('open');
  setTimeout(()=>{
    map.panTo([obra.lat, obra.lng], {animate:true});
  }, 100);
}

function fecharPanel(){
  document.getElementById('side-panel').classList.remove('open');
  if(thumbMap){ thumbMap.remove(); thumbMap=null; }
  const thumb = document.getElementById('sp-thumb');
  const extraDiv = thumb.querySelector('div:not(.sp-thumb-overlay)');
  if(extraDiv) extraDiv.remove();
  document.getElementById('kmz-toggle').style.display = 'none';
}

// Fechar ao clicar no mapa
map.on('click', fecharPanel);

// Contadores
document.getElementById('n-execucao').textContent = OBRAS.filter(o=>o.status==='execucao').length;
document.getElementById('n-total').textContent = OBRAS.length;

// ── KMZ OVERLAY (por obra) ────────────────────────────────
var kmzLayer = null;
var kmzVisible = false;
var kmzLoadedUrl = null;

const kmzColorMap = {
  execucao:    '#FBBF24',
  planejamento:'#60A5FA',
  estudo:      'rgba(255,255,255,.55)',
  concluida:   '#34D399',
};

function atualizarKmzToggle(obra) {
  const toggle = document.getElementById('kmz-toggle');
  const btn    = document.getElementById('btn-kmz');
  if (!obra.kmz) {
    toggle.style.display = 'none';
    if (kmzLayer) { map.removeLayer(kmzLayer); kmzLayer = null; kmzVisible = false; kmzLoadedUrl = null; }
    return;
  }
  toggle.style.display = 'block';
  if (kmzLoadedUrl && kmzLoadedUrl !== obra.kmz) {
    if (kmzLayer) { map.removeLayer(kmzLayer); kmzLayer = null; kmzVisible = false; }
    kmzLoadedUrl = null;
    btn.classList.remove('active');
  }
  btn.dataset.kmz    = obra.kmz;
  btn.dataset.status = obra.status;
}

async function carregarKmz(url, status) {
  const cor = kmzColorMap[status] || '#FBBF24';
  const res = await fetch(url);
  if (!res.ok) throw new Error('HTTP ' + res.status);
  const buf  = await res.arrayBuffer();
  const zip  = await JSZip.loadAsync(buf);
  const kmlName = Object.keys(zip.files).find(n => n.toLowerCase().endsWith('.kml'));
  if (!kmlName) throw new Error('KML não encontrado dentro do KMZ');
  const kmlStr = await zip.files[kmlName].async('string');
  const kmlDom = new DOMParser().parseFromString(kmlStr, 'text/xml');
  const geojson = toGeoJSON.kml(kmlDom);
  return L.geoJSON(geojson, {
    style: { color:cor, weight:2.5, opacity:.9, fillOpacity:.12, fillColor:cor },
    pointToLayer: (f, latlng) =>
      L.circleMarker(latlng, { radius:4, color:cor, fillColor:cor, fillOpacity:.8, weight:1 })
  });
}

async function toggleKmz(btn) {
  const url    = btn.dataset.kmz;
  const status = btn.dataset.status;

  if (!kmzLayer || kmzLoadedUrl !== url) {
    btn.innerHTML = '<span class="kmz-dot"></span>Carregando…';
    btn.disabled = true;
    try {
      if (kmzLayer) { map.removeLayer(kmzLayer); kmzLayer = null; }
      kmzLayer = await carregarKmz(url, status);
      kmzLayer.addTo(map);
      kmzVisible = true;
      kmzLoadedUrl = url;
      btn.innerHTML = '<span class="kmz-dot"></span>Traçado da Obra';
      btn.disabled = false;
      btn.classList.add('active');
    } catch(e) {
      console.error('Erro ao carregar KMZ:', e);
      kmzLayer = null; kmzLoadedUrl = null;
      btn.innerHTML = '<span class="kmz-dot"></span>Traçado da Obra';
      btn.disabled = false;
      alert('Erro ao carregar traçado:\n' + e.message + '\n\nAbra o arquivo via servidor local (ex: Live Server no VS Code).');
    }
    return;
  }
  if (kmzVisible) {
    map.removeLayer(kmzLayer);
    kmzVisible = false;
    btn.classList.remove('active');
  } else {
    kmzLayer.addTo(map);
    kmzVisible = true;
    btn.classList.add('active');
  }
}
</script>
